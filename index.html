    :root{

      --ink-soft:#1e293b;
      --muted:#64748b;
      --brand:#0369a1;
      --brand2:#0c4a6e;
      --brand-light:#e0f2fe;
      --accent:#0284c7;
      --accent-hover:#0ea5e9;
      --good:#059669;
      --good-bg:#d1fae5;
      --bad:#dc2626;
      --bad-bg:#fee2e2;
      --warn:#d97706;
      --warn-bg:#fef3c7;
      --line:#e2e8f0;
      --line-soft:#f1f5f9;

    html{scroll-behavior:smooth}
    body{

      color:var(--ink);
      line-height:1.6;

        radial-gradient(ellipse 140% 80% at 90% 0%, rgba(3,105,161,.06), transparent 50%),
        radial-gradient(ellipse 100% 60% at 10% 100%, rgba(12,74,110,.04), transparent 45%),

    .topbar .row .timerBar{flex:0 0 auto;}
    .topbar .row .brandblock{position:absolute; left:50%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; gap:14px; min-width:0; max-width:55%; text-align:center;}
    .topbar .row .logoWrap{flex:0 0 auto;}
    .brandblock{display:flex; align-items:center; gap:14px; min-width:0; text-align:center;}
    .brandtext{min-width:0; text-align:center}
    .brandtext .u{font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1.2}
    .brandtext .u.en{font-size:13px;font-weight:700;opacity:.9;margin-top:2px;direction:ltr;unicode-bidi:embed;letter-spacing:.03em}
    .sep{opacity:.6;margin:0 6px;font-weight:600;font-size:12px}
    .brandtext .d{font-size:13px;font-weight:700;opacity:.92;margin-top:2px;line-height:1.3}
    .brandtext .s{font-size:12px;opacity:.85;margin-top:2px;font-weight:600}

    .timerBar{font-size:14px;font-weight:800;white-space:nowrap;padding:6px 12px;background:rgba(255,255,255,.2);border-radius:10px;border:1px solid rgba(255,255,255,.35);min-width:90px;text-align:center;}
    .timerBar.warn{background:rgba(217,119,6,.4);border-color:rgba(255,255,255,.5);}
    .timerBar.done{background:rgba(220,38,38,.4);border-color:rgba(255,255,255,.5);}

    .logoWrap{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      display:flex; align-items:center; justify-content:center;
      padding:10px 12px;
      background: rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.35);
      border-radius:12px;
      box-shadow:
        0 12px 24px rgba(0,0,0,.2),

    .wrap{
      max-width:900px;
      margin:24px auto 40px;
      padding:0 24px;
      display:block;
    }

      .wrap{ max-width:calc(66.666vw); }
    }
    @media (max-width: 820px){ .wrap{ max-width:100%; padding:0 12px; } }
    /* إخفاء اللوحات الجانبية من الشبكة – ستُعرض كدرج عائم */
    .side, .aiResultsRail { display:none !important; }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r-lg);
      box-shadow: var(--shadow);
      overflow:hidden;
      transition: var(--transition);
    }
    .card:hover{box-shadow: 0 8px 30px rgba(15,23,42,.09)}
    .mainhead{
      padding:12px 16px;
      border-bottom:1px solid var(--line);
      display:flex; gap:10px; align-items:center; justify-content:center;
      background: linear-gradient(180deg, var(--line-soft) 0%, var(--card) 100%);
    }
    .pill{
      background:var(--brand-light);color:var(--brand);border:1px solid rgba(3,105,161,.25);
      border-radius:999px;padding:6px 12px;font-weight:700;font-size:12px;white-space:nowrap;
    }
    .pill.warn{background:var(--warn-bg);color:var(--warn);border-color:rgba(217,119,6,.3)}
    .content{padding:20px 22px 24px}

    .qtitleRow{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
    .qtitle{display:flex; align-items:center; gap:12px; font-size:17px; font-weight:800; color:var(--ink); min-width:0;}
    .qtitle .qnum{
      width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
      background: linear-gradient(135deg, var(--brand-light), #bae6fd);
      border:1px solid rgba(3,105,161,.2);color:var(--brand);font-weight:800;flex:0 0 auto;
      font-size:16px;
    }
    .qmeta{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}

    .btn{
      border:1px solid var(--line);
      background:var(--card);
      color:var(--ink);
      border-radius:12px;
      padding:10px 16px;
      font-weight:800;
      font-size:14px;
      cursor:pointer;
      transition: var(--transition);
      display:inline-flex; align-items:center; gap:8px;
      user-select:none;
      white-space:nowrap;
      font-family:var(--font);
    }
    .btn:hover{
      background:var(--line-soft);
      border-color:var(--muted);
      transform:translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .btn.primary{
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      border-color: transparent;
      color:#fff;
    }
    .btn.primary:hover{
      background: linear-gradient(135deg, var(--accent), var(--brand));
      box-shadow: 0 4px 16px rgba(3,105,161,.35);
    }
    .btn.small{padding:8px 14px;font-size:13px;border-radius:10px}
    .btn:disabled{cursor:not-allowed;opacity:.55;transform:none;box-shadow:none}
        .btn.ai-help-btn{

    .btn.ai-help-btn::before{

    .btn.ai-help-btn::after{

      width:22px;
      height:22px;

    .ai-help-glyph::after{
      content:"";

      inset:3px;

      opacity:.88;
    }
    .ai-help-glyph::after{
      width:6px;

      box-shadow:0 0 0 2px rgba(255,255,255,.18), 0 0 14px rgba(103,232,249,.9);
    }
    .ai-help-panel{
      display:grid;
      gap:16px;
      animation:aiPanelReveal .38s ease both;
    }
    .ai-help-hero{
      position:relative;
      animation:aiHeroFloat 5.2s ease-in-out infinite;
      overflow:hidden;
      display:flex;
      align-items:center;

        radial-gradient(circle at 18% 22%, rgba(34,211,238,.24), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(59,130,246,.18), transparent 24%),

    .ai-help-orb{

    .ai-help-orb::before,

    .ai-help-orb::before{inset:10px}

    .ai-help-orb span{
      width:14px;
      height:14px;

      background:#67e8f9;
      box-shadow:0 0 18px rgba(103,232,249,.95);
      animation:aiCorePulse 2.8s ease-in-out infinite;
    }
    .ai-help-copy{position:relative;z-index:1;display:grid;gap:6px}
    .ai-help-kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:max-content;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;

    .ai-help-kicker::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:#67e8f9;
      box-shadow:0 0 10px rgba(103,232,249,.9);
    }
    .ai-help-title{
      font-size:18px;
      font-weight:900;
      line-height:1.5;
    }
    .ai-help-subtitle{
      color:rgba(255,255,255,.82);
      font-size:13px;
      font-weight:700;
      line-height:1.9;
    }
    .ai-help-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
    }
    .ai-help-section{
      position:relative;
      overflow:hidden;
      border:1px solid rgba(148,163,184,.24);
      border-radius:16px;
      padding:16px;
      background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      box-shadow:0 10px 28px rgba(15,23,42,.07);
    }
    .ai-help-section::before{
      content:"";
      position:absolute;
      inset:0 auto 0 0;
      width:4px;
      background:linear-gradient(180deg, #22d3ee, #0369a1);

    .ai-help-section-head{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      font-size:15px;
      font-weight:900;
      color:var(--ink);
    }
    .ai-help-chip-icon{
      width:34px;
      height:34px;
      border-radius:11px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, rgba(8,145,178,.16), rgba(14,165,233,.08));
      color:var(--brand2);
      border:1px solid rgba(8,145,178,.2);
      font-size:16px;
    }
    .ai-help-body{
      color:var(--ink-soft);
      font-size:14px;
      font-weight:700;
      line-height:1.95;
    }
    .ai-help-body ul,
    .ai-help-body ol{margin:0;padding-right:18px}
    @media (max-width: 720px){
      .ai-help-hero{flex-direction:column;align-items:flex-start;padding:16px}
      .ai-help-grid{grid-template-columns:1fr}
      .ai-help-orb{width:64px;height:64px;border-radius:18px}
    }
    @keyframes aiPulse{0%{box-shadow:0 0 0 0 rgba(8,145,178,.28)}70%{box-shadow:0 0 0 10px rgba(8,145,178,0)}100%{box-shadow:0 0 0 0 rgba(8,145,178,0)}}
    @keyframes aiWake{0%{transform:scale(1) rotate(0)}35%{transform:scale(1.08) rotate(-8deg)}70%{transform:scale(.96) rotate(8deg)}100%{transform:scale(1) rotate(0)}}
    @keyframes aiCorePulse{0%,100%{transform:scale(.92);box-shadow:0 0 14px rgba(103,232,249,.72)}50%{transform:scale(1.14);box-shadow:0 0 26px rgba(103,232,249,.98)}}
    @keyframes aiHeroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @keyframes aiPanelReveal{0%{opacity:0;transform:translateY(8px) scale(.985)}100%{opacity:1;transform:translateY(0) scale(1)}}
    button:focus, .btn:focus{outline:none}
    button:focus-visible, .btn:focus-visible, a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

    .branches{display:grid; gap:16px;}
    .branch{border:1px solid var(--line); border-radius:16px; background:var(--card); overflow:hidden; transition: var(--transition);}
    .branch:hover{border-color:var(--line);box-shadow: var(--shadow-sm)}
    .branchHead{
      display:flex; align-items:center; justify-content:flex-end; gap:12px;
      padding:14px 16px;
      background: linear-gradient(180deg, var(--line-soft), var(--card));
      border-bottom:1px solid var(--line);
    }
    .btag{font-size:12px;padding:6px 12px;border-radius:10px;font-weight:800;border:1px solid;white-space:nowrap;}
    .btag.easy{background:var(--good-bg);border-color:rgba(5,150,105,.25);color:var(--good)}
    .btag.med{background:var(--warn-bg);border-color:rgba(217,119,6,.25);color:var(--warn)}
    .btag.hard{background:var(--bad-bg);border-color:rgba(220,38,38,.25);color:var(--bad)}
    .branchBody{padding:16px 18px 18px; line-height:1.85; font-size:15px; font-weight:600; color:var(--ink-soft)}

      border-radius:14px;

    }

    .part .inputWrap{display:flex; gap:10px; align-items:center; justify-content:flex-end; flex:0 0 auto;}
    .part.mcqPart{flex-direction:column;align-items:stretch;justify-content:flex-start;}
    .part.mcqPart .label{width:100%;font-size:15px;}
    .part.mcqPart .inputWrap{width:100%;justify-content:stretch;flex:1 1 auto;}
    input[type="text"], input[type="number"], textarea, select{
      border:2px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      min-width:180px;
      outline:none;
      transition: var(--transition);
      background:var(--card);
      font-family:var(--font);
      font-weight:700;
      color:var(--ink);
    }
    textarea{min-width:260px; min-height:90px; resize:vertical}
    input:focus, textarea:focus, select:focus{
      border-color:var(--brand);
      box-shadow: 0 0 0 3px rgba(3,105,161,.15);
    }
    .branchBtns{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; justify-content:flex-start}

    .side{padding:20px;}
    .side .head{display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:14px;}
    .side .head h3{margin:0; font-size:18px; font-weight:900; color:var(--ink);}

    .progress > div{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--brand));border-radius:999px;transition:.4s width ease-out;}
    .qList{margin-top:14px;display:flex;flex-direction:column;gap:10px;}

      font-size:13px;
      font-weight:600;

    .modal.show{display:flex;animation:modalFadeIn .2s ease}
    @keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
    .modal .box{width:min(900px, 100%);background:var(--card);border-radius:20px;border:1px solid var(--line);box-shadow: var(--shadow-lg);overflow:hidden;animation:modalSlide .25s ease;}
    @keyframes modalSlide{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
    .modal .box .mh{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:var(--line-soft);}
    .modal .box .mh b{font-size:16px;font-weight:800;color:var(--ink)}
    .modal .box .mb{padding:20px 22px;color:var(--ink-soft);line-height:1.9;max-height:70vh;overflow:auto;}

    .stemleaf{
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      background:linear-gradient(180deg, var(--line-soft), var(--card));
      margin-top:14px;
    }
    .stemleaf .slRow{
      display:grid;
      grid-template-columns: 110px 12px 1fr;
      gap:12px;
      align-items:center;
      margin-top:12px;
      font-weight:800;
      direction:ltr;
    }
    .stemleaf .sep{
      width:12px;height:46px;border-radius:10px;background:var(--line);
      display:grid; place-items:center; color:var(--muted);
      font-weight:800;
    }
    .stemleaf .stem{
      border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--card);
      text-align:center;font-family: ui-monospace, monospace;
    }
    .stemleaf .leaves{
      border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--card);
      font-family: ui-monospace, monospace;
      text-align:left; white-space:nowrap; overflow:auto;
    }

    table.ftable{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:14px;
      border:1px solid var(--line);
      background:var(--card);
      margin-top:14px;
      direction:ltr;
      box-shadow: var(--shadow-sm);

    .ftable th{

      font-size:13px;
      font-weight:800;
      border:1px solid rgba(255,255,255,.15);
      text-align:center;
      white-space:nowrap;

    .ftable td{
      border:1px solid var(--line);

      text-align:center;
      font-weight:700;
      color:var(--ink);
      font-size:13px;
      background:var(--card);
    }
    .ftable tr:nth-child(even) td{background:var(--bg-warm)}
    .cellInput{
      width:100%;

      padding:10px 12px;
      border-radius:10px;
      border:2px solid var(--line);
      background:var(--card);
      font-weight:700;
      text-align:center;
      font-family:var(--font);
    }

    .charts{
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      background: linear-gradient(180deg, var(--line-soft), var(--card));

      grid-template-columns: 1fr 1fr;
      gap:16px;
      align-items:start;

    .chartBox{
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--card);
      padding:16px;
      overflow:hidden;
      transition: var(--transition);
    }
    .chartBox:hover{box-shadow: var(--shadow-sm)}
    .chartTitle{font-weight:800;color:var(--ink);margin-bottom:10px;font-size:14px}
    .chartNote{color:var(--muted);font-weight:600;font-size:12px;margin-top:10px;line-height:1.5}
    svg{display:block;width:100%;height:auto}

    .hint{margin-top:10px;font-size:13px;color:var(--muted);font-weight:700}
    .dataGrid{font-family:ui-monospace, monospace;font-size:14px;padding:12px;background:var(--line-soft);border-radius:10px;margin:10px 0;border:1px solid var(--line);direction:ltr;text-align:left}
    .smallMuted{color:var(--muted);font-size:14px;font-weight:600}

    input:focus, textarea:focus, select:focus{
      outline:none;
      border-color:var(--brand);
      box-shadow: 0 0 0 3px rgba(3,105,161,.15);
    }
    .cellWrap{display:flex;flex-direction:column;align-items:center;gap:6px}
    .cellHint{font-size:11px;color:var(--muted);font-weight:600}

    .mcqGroup{display:flex;flex-direction:column;gap:10px;margin-top:12px;align-items:stretch}
    .choice{
      display:flex; align-items:center; gap:12px;
      border:2px solid var(--line);
      border-radius:14px;
      padding:12px 16px;
      font-weight:700;
      color:var(--ink);
      cursor:pointer;
      background:var(--card);
      transition: var(--transition);
    }
    .choice:hover{
      border-color:var(--brand);
      background:var(--brand-light);
      transform:translateX(-2px);
      box-shadow: var(--shadow-sm);
    }
    .choice input{width:18px; height:18px; margin:0; accent-color:var(--brand)}
    .choice.badField{border-color:var(--bad); background:var(--bad-bg); color:var(--bad)}
    .choice.goodField{border-color:var(--good); background:var(--good-bg); color:var(--good)}

    input.badField, textarea.badField{border-color:var(--bad) !important; background:var(--bad-bg) !important}
    input.goodField, textarea.goodField{border-color:var(--good) !important; background:var(--good-bg) !important}

    .chartTip{position:fixed; z-index:10000; pointer-events:none; background:var(--ink); color:#fff; padding:12px 14px; border-radius:12px; box-shadow: var(--shadow-lg); font-weight:700; font-size:12px; max-width:280px; line-height:1.5}
    .graphs{display:grid; gap:16px;}
    .svgInteractive .barSeg,.svgInteractive .pieSeg{cursor:pointer; transition: var(--transition)}
    .svgInteractive .barSeg:hover,.svgInteractive .pieSeg:hover{opacity:.9}
    .svgInteractive .barSeg.selected, .svgInteractive .pieSeg.selected, .svgInteractive .polyDot.selected, .svgInteractive .ogDot.selected{stroke:var(--brand); stroke-width:3}

    .katex,.katex-display,.mathInline,.mathBlock{direction:ltr;unicode-bidi:embed;}
    .mathInline{display:inline-block;}
    .mathBlock{display:block;}
    .katex-display{overflow-x:auto; overflow-y:hidden;}
    .rtlText{ direction:rtl; unicode-bidi:plaintext; }
    .ltr{ direction:ltr; unicode-bidi:bidi-override; }
    body.font-sm{ font-size: 90%; }
    body.font-lg{ font-size: 110%; }
    .unsaved-dot{ width:8px;height:8px;border-radius:50%;background:var(--warn);flex-shrink:0; }
    .sidebar-filter{ display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap; }
    .sidebar-filter .btn.small{ padding:6px 10px;font-size:12px; }
    .score-bar-wrap{ height:12px;background:var(--line);border-radius:999px;overflow:hidden;margin:10px 0;display:flex; }
    .score-bar-correct{ height:100%;background:linear-gradient(90deg,var(--good),var(--accent));border-radius:999px;transition:width .3s; }
    .score-bar-wrong{ height:100%;background:var(--line);border-radius:0 999px 999px 0; }
    @media print{
      body * { visibility: hidden; }
      .modal.show, .modal.show * { visibility: visible; }
      .modal.show { position: fixed; inset: 0; background: #fff; z-index: 99999; }
      .modal .box { box-shadow: none; border: 1px solid #ccc; }
    }

/* ═══════════════════════════════════════════════
   تصميم جامعي — نظام ألوان رسمي
═══════════════════════════════════════════════ */
:root{
  --uni-gold: #C8972A;
  --uni-gold-light: #FDF6E3;
  --uni-gold-border: rgba(200,151,42,.25);
  --uni-green: #1a6b3c;
}

/* شريط علوي — هوية أكاديمية */
.topbar{
  background:linear-gradient(135deg,#0b3c5d 0%,#154360 40%,#0d3349 100%) !important;
  border-bottom:3px solid var(--uni-gold);
}
.topbar.scrolled{
  box-shadow:0 4px 30px rgba(11,60,93,.45) !important;
}

/* شريط ذهبي دقيق تحت الـ topbar */
.topbar::after{
  content:"";
  position:absolute;
  bottom:-3px; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,var(--uni-gold),transparent);
  opacity:.6;
}

/* Cards — حدود أكاديمية */
.card{
  border-top:3px solid var(--brand) !important;
  border-radius:18px;
}

/* Section titles — طراز أكاديمي */
.mainhead{
  background:linear-gradient(180deg,#f0f7ff 0%,#ffffff 100%);
  border-bottom:2px solid var(--uni-gold-border);
}
.mainhead::after{
  content:"";
  display:block;
  position:absolute;
  bottom:0; left:20px; right:20px;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--uni-gold),transparent);
  opacity:.5;
}
.mainhead{ position:relative; }

/* شارة الجامعة على السؤال */
.pill{
  background:linear-gradient(135deg,var(--uni-gold-light),#fff8e7);
  color:#8B6914;
  border-color:var(--uni-gold-border);
  font-weight:900;
}

/* ═══════════════════════════════════════════════
   تحسين شاشة الإجابة الصحيحة
═══════════════════════════════════════════════ */
.choice.goodField{
  background:linear-gradient(135deg,#f0fdf4 0%,#dcfce7 100%) !important;
  border-color:#16a34a !important;
  border-width:2px !important;
  color:#15803d !important;
  box-shadow:0 0 0 4px rgba(22,163,74,.12), 0 4px 14px rgba(22,163,74,.1) !important;
  position:relative;
}
.choice.goodField::after{
  content:"✓ صحيح";
  position:absolute;
  left:14px; top:50%;
  transform:translateY(-50%);
  font-size:11px;font-weight:900;
  color:#15803d;
  background:#dcfce7;
  padding:3px 8px;border-radius:6px;
  border:1px solid rgba(22,163,74,.3);
}
.choice.badField{
  background:linear-gradient(135deg,#fff5f5 0%,#fee2e2 100%) !important;
  border-color:#dc2626 !important;
  border-width:2px !important;
  color:#b91c1c !important;
  box-shadow:0 0 0 4px rgba(220,38,38,.1) !important;
  position:relative;
}
.choice.badField::after{
  content:"✗ خطأ";
  position:absolute;
  left:14px; top:50%;
  transform:translateY(-50%);
  font-size:11px;font-weight:900;
  color:#b91c1c;
  background:#fee2e2;
  padding:3px 8px;border-radius:6px;
  border:1px solid rgba(220,38,38,.25);
}
input.goodField, textarea.goodField{
  border-color:#16a34a !important;
  background:linear-gradient(135deg,#f0fdf4,#dcfce7) !important;
  box-shadow:0 0 0 3px rgba(22,163,74,.15) !important;
}
input.badField, textarea.badField{
  border-color:#dc2626 !important;
  background:linear-gradient(135deg,#fff5f5,#fee2e2) !important;
  box-shadow:0 0 0 3px rgba(220,38,38,.12) !important;
}

/* ═══════════════════════════════════════════════
   تطوير صفحة النتائج
═══════════════════════════════════════════════ */
.scoreCard{
  border-radius:20px !important;
  background:linear-gradient(135deg,#0b3c5d 0%,#154360 60%,#1a6b3c 100%) !important;
  border:none !important;
  color:#fff !important;
  padding:24px !important;
  box-shadow:0 20px 40px rgba(11,60,93,.25) !important;
  position:relative;
  overflow:hidden;
}
.scoreCard::before{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 1px,transparent 1px 20px);
  pointer-events:none;
}
.scoreCard::after{
  content:"";
  position:absolute;
  bottom:0; left:0; right:0;
  height:4px;
  background:linear-gradient(90deg,var(--uni-gold),#fde68a,var(--uni-gold));
}
.scoreBig{
  font-size:24px !important;
  font-weight:900 !important;
  color:#fff !important;
  position:relative;
}
.scoreSub{ color:rgba(255,255,255,.8) !important; position:relative; }
.score-bar-wrap{
  background:rgba(255,255,255,.15) !important;
  height:10px !important;
  border-radius:999px;
  position:relative;
}
.score-bar-correct{
  background:linear-gradient(90deg,#34d399,#a7f3d0) !important;
}

/* بطاقات النتائج */
.resultCard{
  border-radius:16px !important;
  border:1px solid var(--line) !important;
  box-shadow:0 4px 16px rgba(15,23,42,.06) !important;
  overflow:hidden;
  transition:var(--transition);
}
.resultCard:hover{
  border-color:var(--brand) !important;
  box-shadow:0 8px 24px rgba(3,105,161,.1) !important;
  transform:translateY(-1px);
}
/* رأس بطاقة النتيجة */
.resultCard > div:first-child{
  background:linear-gradient(180deg,#f8fbff 0%,#ffffff 100%);
  padding:14px 16px 12px !important;
  border-bottom:1px solid var(--line);
  margin-bottom:0 !important;
}

.tag.good{
  background:linear-gradient(135deg,#dcfce7,#f0fdf4) !important;
  border-color:rgba(22,163,74,.3) !important;
  color:#15803d !important;
  font-weight:900;
  padding:6px 14px;
}
.tag.bad{
  background:linear-gradient(135deg,#fee2e2,#fff5f5) !important;
  border-color:rgba(220,38,38,.3) !important;
  color:#b91c1c !important;
  font-weight:900;
  padding:6px 14px;
}

/* صفوف الأجزاء */
.partRow{
  border-radius:10px !important;
  border:1px solid var(--line) !important;
  background:#f8fbff !important;
  padding:12px 16px !important;
  font-size:13px;
  transition:var(--transition);
}
.partRow:hover{ background:#eef6ff !important; border-color:rgba(3,105,161,.2) !important; }

/* أزرار النتيجة */
.scoreCard .btn.primary{
  background:linear-gradient(135deg,var(--uni-gold),#b07d20) !important;
  border:none !important;
  box-shadow:0 4px 14px rgba(200,151,42,.35) !important;
  color:#fff !important;
  position:relative;
}
.scoreCard .btn.primary:hover{
  background:linear-gradient(135deg,#d4a43a,var(--uni-gold)) !important;
  transform:translateY(-2px) !important;
  box-shadow:0 8px 20px rgba(200,151,42,.45) !important;
}
:root{
  --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 2px 8px rgba(15,23,42,.06);
  --shadow:    0 4px 6px rgba(15,23,42,.04), 0 10px 28px rgba(15,23,42,.08);
  --shadow-lg: 0 20px 25px rgba(15,23,42,.08), 0 40px 60px rgba(15,23,42,.12);
}
/* Topbar — Glass أقوى */
.topbar{
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,.1);
}
/* Scroll-linked shadow على الـ topbar */
.topbar.scrolled{ box-shadow:0 4px 30px rgba(15,23,42,.3); }

/* Cards — ضلع علوي ملون + hover أجمل */
.card{ border-top:3px solid var(--brand); }
.card:hover{ box-shadow:0 12px 36px rgba(15,23,42,.11); transform:translateY(-1px); }

/* Progress bar — shimmer متحرك */
.progress{
  height:8px;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.07);
}
.progress > div{
  background-size:200% 100%;
  animation:progressShimmer 2.4s linear infinite;
  background-image:linear-gradient(90deg, #0369a1 0%, #38bdf8 50%, #0369a1 100%);
}
@keyframes progressShimmer{
  0%{background-position:100% 0}
  100%{background-position:-100% 0}
}

/* Question number badge */
.qtitle .qnum{
  background:linear-gradient(135deg, var(--brand), var(--brand2));
  color:#fff;
  border:none;
  box-shadow:0 6px 16px rgba(3,105,161,.3);
  font-size:17px;
  width:44px; height:44px;
  border-radius:14px;
}

/* MCQ choices — تحسين التفاعل */
.choice{
  position:relative;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  border-width:2px;
}
.choice:hover{ transform:translateX(-3px); box-shadow:0 4px 14px rgba(3,105,161,.12); }
.choice.goodField{
  box-shadow:0 0 0 3px rgba(5,150,105,.18);
  animation:correctPop .3s ease;
}
.choice.badField{ box-shadow:0 0 0 3px rgba(220,38,38,.15); }
@keyframes correctPop{
  0%{transform:scale(1)}
  50%{transform:scale(1.02)}
  100%{transform:scale(1)}
}

/* Difficulty tags */
.btag{ letter-spacing:.04em; text-transform:uppercase; font-size:11px; border-radius:8px; }

/* Timer */
.timerBar{
  font-variant-numeric:tabular-nums;
  letter-spacing:.06em;
  font-size:16px;
  padding:8px 18px;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
  border-radius:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
}

/* AI Model cards — hover مع خط سفلي */
.aiModelCard{
  transition:transform .2s, box-shadow .2s;
  cursor:default;
}
.aiModelCard::after{
  content:"";
  position:absolute;
  bottom:0; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg, var(--brand), #38bdf8);
  transform:scaleX(0);
  transition:transform .3s;
  transform-origin:right;
  border-radius:0 0 4px 4px;
}
.aiModelCard:hover{ transform:translateY(-2px); box-shadow:0 10px 28px rgba(15,23,42,.1); }
.aiModelCard:hover::after{ transform:scaleX(1); }

/* ═══════════════════════════════════════════════
   النماذج الخمسة الجديدة — CSS
═══════════════════════════════════════════════ */

/* قسم النماذج الموسّع */
.aiExtSection{
  border-radius:18px;
  border:1px solid var(--line);

.forgettingFill{height:100%;border-radius:inherit;transition:width .5s ease;}
.forgettingPct{font-size:11px;font-weight:900;min-width:36px;text-align:left;direction:ltr;}
.forgettingReview{

.forgettingReview.now{background:#fee2e2;color:#dc2626;border:1px solid rgba(220,38,38,.2)}

/* ٢. IRT — قدرة الطالب */

}
.irtTheta{

  gap:14px;
}
.irtThetaNum{

}
.irtThetaSub{font-size:12px;font-weight:800;color:var(--muted);line-height:1.6}
.irtScale{
  position:relative;
  height:12px;
  border-radius:999px;
  background:linear-gradient(90deg,#dc2626 0%,#d97706 25%,#0369a1 50%,#059669 75%,#0284c7 100%);
  overflow:visible;
  margin:4px 0;
}
.irtPointer{

  top:50%;

  border-radius:50%;
  background:#fff;
  border:3px solid var(--brand);
  box-shadow:0 2px 8px rgba(3,105,161,.35);

}
.irtLabels{
  display:flex;
  justify-content:space-between;

  font-weight:900;

}
.irtSE{
  font-size:11px;
  font-weight:800;
  color:var(--muted);
  background:#f1f5f9;
  border-radius:8px;
  padding:6px 10px;
  text-align:center;
}

/* ٣. محلل نمط الأخطاء */
.errorPatternCard{display:grid;gap:10px}
.errorTypeRow{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:12px;
  border:1px solid var(--line);
  background:#f8fbff;
}
.errorTypeBadge{
  font-size:11px;font-weight:900;padding:4px 10px;border-radius:8px;white-space:nowrap;
}
.errorTypeBadge.conceptual{background:#fee2e2;color:#dc2626;border:1px solid rgba(220,38,38,.2)}
.errorTypeBadge.computational{background:#fef3c7;color:#d97706;border:1px solid rgba(217,119,6,.2)}
.errorTypeBadge.application{background:#ede9fe;color:#7c3aed;border:1px solid rgba(124,58,237,.2)}
.errorTypeBadge.none{background:#d1fae5;color:#059669;border:1px solid rgba(5,150,105,.2)}
.errorTypeDetail{flex:1;min-width:0}
.errorTypeName{font-size:12px;font-weight:900;color:var(--ink);margin-bottom:2px}
.errorTypeAdvice{font-size:11px;font-weight:800;color:var(--muted);line-height:1.5}
.errorTypeCount{font-size:18px;font-weight:900;color:var(--brand2);flex:0 0 auto}
.errorBarWrap{display:flex;gap:3px;height:6px;border-radius:999px;overflow:hidden;background:#edf4fb}
.errorBarSeg{height:100%;border-radius:999px;transition:width .5s ease}

/* ٤. معايرة الثقة */
.calibCard{display:grid;gap:12px}
.calibMatrix{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.calibCell{
  border-radius:12px;
  border:1px solid var(--line);
  background:#f8fbff;
  padding:10px 8px;
  text-align:center;
}
.calibCellVal{font-size:20px;font-weight:900;color:var(--brand2)}
.calibCellLabel{font-size:10px;font-weight:900;color:var(--muted);margin-top:3px;line-height:1.4}
.calibDiag{
  font-size:12px;font-weight:800;line-height:1.8;
  padding:10px 12px;border-radius:12px;
  background:#f1f5f9;border:1px solid var(--line);
  color:#334155;
}
.calibScore{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:8px 12px;border-radius:10px;
  font-size:12px;font-weight:900;
}
.calibScore.good{background:#d1fae5;color:#059669}
.calibScore.warn{background:#fef3c7;color:#d97706}
.calibScore.bad{background:#fee2e2;color:#dc2626}

/* ٥. توقع الدرجة */
.gradeCard{display:grid;gap:12px}
.gradeBig{
  display:flex;align-items:center;gap:16px;
  padding:16px;border-radius:16px;
  border:2px solid var(--line);
}
.gradeLabel{font-size:22px;font-weight:900}
.gradeRange{font-size:13px;font-weight:800;color:var(--muted);margin-top:2px}
.gradeTrajectory{
  display:grid;gap:6px;
}
.gradeTrajectoryRow{
  display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;
  font-size:11px;font-weight:900;
}
.gradeTrajectoryBar{height:8px;border-radius:999px;background:#edf4fb;overflow:hidden;border:1px solid #dbe7f2}
.gradeTrajectoryFill{height:100%;border-radius:inherit;transition:width .6s ease}
.gradeTip{
  font-size:12px;font-weight:800;line-height:1.8;color:#334155;
  padding:10px 12px;border-radius:12px;background:#f1f5f9;border:1px solid var(--line);
}

/* Section titles للأقسام الجديدة */
.aiExtSectionTitle{
  font-size:13px;font-weight:900;color:var(--ink);
  display:flex;align-items:center;gap:8px;
  padding-bottom:8px;
  border-bottom:1px solid var(--line);
}
.aiExtSectionTitle::before{
  content:"";width:4px;height:18px;border-radius:2px;
  background:linear-gradient(180deg,var(--brand),#38bdf8);
  flex:0 0 auto;
}

/* شارة النموذج */
.aiExtModelBadge{
  font-size:10px;font-weight:900;letter-spacing:.05em;
  padding:3px 8px;border-radius:6px;
  background:rgba(3,105,161,.08);border:1px solid rgba(3,105,161,.18);
  color:var(--brand2);margin-right:auto;
}

/* ═══════════════════════════════════════════════
   تحسين المودالات — صحيح / تنبيه / الإجابة الصحيحة
═══════════════════════════════════════════════ */
.modal-success-body{
  display:flex; flex-direction:column; align-items:center;
  text-align:center; padding:36px 24px; gap:16px;
}
.modal-success-orb{
  width:88px; height:88px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #bbf7d0, #dcfce7);
  border:3px solid rgba(22,163,74,.25);
  display:grid; place-items:center; font-size:42px;
  box-shadow:0 0 0 12px rgba(22,163,74,.07), 0 14px 32px rgba(22,163,74,.18);
  animation:successPop .45s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes successPop{
  0%{transform:scale(.4);opacity:0}
  100%{transform:scale(1);opacity:1}
}
.modal-success-title{
  font-size:24px; font-weight:900; color:#15803d;
  animation:fadeUpIn .35s .1s ease both;
}
.modal-success-badge{
  display:inline-flex; align-items:center; gap:8px;
  padding:7px 16px; border-radius:999px;
  background:linear-gradient(135deg,#dcfce7,#f0fdf4);
  border:1px solid rgba(22,163,74,.3);
  font-size:13px; font-weight:900; color:#166534;
  animation:fadeUpIn .35s .18s ease both;
}
.modal-success-badge::before{
  content:""; width:8px; height:8px; border-radius:50%;
  background:#22c55e; box-shadow:0 0 8px rgba(34,197,94,.8);
  animation:aiModelsPulse 1.8s infinite;
}
.modal-success-stars{
  display:flex; gap:8px; font-size:22px;
  animation:fadeUpIn .35s .26s ease both;
}
.modal-success-note{
  font-size:13px; font-weight:700; color:#166534;
  background:#f0fdf4; border:1px solid rgba(22,163,74,.2);
  border-radius:12px; padding:10px 16px; line-height:1.7;
  animation:fadeUpIn .35s .34s ease both;
  max-width:300px;
}
@keyframes fadeUpIn{
  0%{opacity:0;transform:translateY(12px)}
  100%{opacity:1;transform:translateY(0)}
}

/* Warning Modal */
.modal-warn-body{
  display:flex; gap:14px; align-items:flex-start;
  padding:24px;
}
.modal-warn-icon{
  width:52px; height:52px; flex:0 0 auto;
  border-radius:14px;
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  border:1px solid rgba(217,119,6,.22);
  display:grid; place-items:center; font-size:24px;
}
.modal-warn-title{ font-size:16px; font-weight:900; color:#92400e; margin-bottom:6px; }
.modal-warn-text{ font-size:14px; font-weight:700; color:#78350f; line-height:1.75; }

/* تحسين modal عام */
.modal .box{ border-radius:22px !important; box-shadow:0 30px 70px rgba(15,23,42,.2) !important; }
.modal .box .mh{
  background:linear-gradient(180deg,#f8fbff 0%,#ffffff 100%);
  border-bottom:2px solid var(--line);
  padding:16px 20px;
}
.modal .box .mh b{ font-size:16px; font-weight:900; }

function xmur3(str){
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return function(){
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    return (h ^= h >>> 16) >>> 0;
  }
}
function mulberry32(a){
  return function(){
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
}
function seededRand(seedStr){
  const seed = xmur3(seedStr)();
  return mulberry32(seed);
}
function randInt(r, lo, hi){ return Math.floor(r()*(hi-lo+1))+lo; }

function storageGet(key){ try{ return __storage ? __storage.getItem(key) : null; }catch(e){ return null; } }
function storageSet(key, val){ try{ if(__storage) __storage.setItem(key, val); }catch(e){} }
function storageRemove(key){ try{ if(__storage) __storage.removeItem(key); }catch(e){} }

const state = loadState() || { currentIndex: 0, variants: {}, branches: {}, order: null, timerEnded: false, dirty: {}, sidebarFilter: "all", fontSize: 0 };
function saveState(){ storageSet(STATE_KEY, JSON.stringify(state)); }
function loadState(){ try{ const s = JSON.parse(storageGet(STATE_KEY)); if(s){ s.timerEnded = !!s.timerEnded; if(!s.dirty) s.dirty = {}; if(!s.sidebarFilter) s.sidebarFilter = "all"; if(s.fontSize==null) s.fontSize = 0; } return s; }catch(e){ return null; } }

let timerInterval = null;
function startTimer(){
  let endAt = null;
  try{ const v = storageGet(TIMER_KEY); if(v) endAt = parseInt(v,10); }catch(e){}
  if(endAt == null || endAt < Date.now()){
    endAt = Date.now() + TIMER_MINUTES * 60 * 1000;
    storageSet(TIMER_KEY, String(endAt));
  }
  if(endAt != null && endAt > Date.now()){
    state.timerEnded = false;
    saveState();
    renderAll();
  }
  let oneMinuteWarned = false;
  function tick(){
    if(state.timerEnded) return;
    const rem = Math.max(0, Math.ceil((endAt - Date.now()) / 1000));
    const el = document.getElementById("timerBar");
    if(!el) return;
    const m = Math.floor(rem/60), s = rem % 60;
    el.textContent = "الوقت المتبقي: " + m + ":" + (s<10?"0":"") + s;
    el.classList.remove("warn","done");
    if(rem <= 60) el.classList.add("warn");
    if(rem === 60 && !oneMinuteWarned){ oneMinuteWarned = true; openModal("تنبيه", "<p style=\"font-weight:800\">بقيت دقيقة واحدة على انتهاء الوقت.</p>"); }
    if(rem === 0){
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      window.__examRunning = false;
      state.timerEnded = true;
      saveState();
      el.textContent = "انتهى الوقت";
      el.classList.add("done");
      showResultsModal();
      renderAll();
    }
  }
  tick();
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
}

function resetAll(){
  try{
    var _k = (typeof window !== "undefined" && window.AI_MODELS_KEY) ? window.AI_MODELS_KEY : null;
    if(_k){
      var _raw = null;
      try{ _raw = localStorage.getItem(_k); }catch(_e){ _raw = null; }
      var _s = null;
      if(_raw){ try{ _s = JSON.parse(_raw); }catch(_e){ _s = null; } }
      if(!_s || typeof _s !== "object") _s = {};
      _s.examAttempts = (Number(_s.examAttempts) || 0) + 1;
      try{ localStorage.setItem(_k, JSON.stringify(_s)); }catch(_e){}
    }
  }catch(_e){}
  state.currentIndex = 0;
  state.variants = {};
  state.branches = {};
  state.activeOrder = [];
  state.masteryVersion = null;
  state.masterySupportCount = 0;
  state.masterySupportLog = [];
  state.masterySupportSources = {};
  state.order = null;
  delete state.masteryVersion;
  state.masterySupportCount = 0;
  state.timerEnded = false;
  state.dirty = {};
  state.sidebarFilter = "all";
  state.fontSize = 0;
  storageRemove(TIMER_KEY);
  saveState();
  location.reload();
}

const SVG_TAGS = new Set(["svg","g","path","rect","line","circle","text","defs","linearGradient","stop","polyline","polygon"]);
function el(tag, attrs={}, children=[]){
  const isSvg = SVG_TAGS.has(String(tag).toLowerCase());
  const node = isSvg ? document.createElementNS("http://www.w3.org/2000/svg", tag) : document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class") node.className=v;
    else if(k==="html") node.innerHTML=v;
    else if(k.startsWith("on") && typeof v==="function") node.addEventListener(k.slice(2), v);
    else if(k==="disabled") node.disabled=!!v;
    else node.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(ch=>{
    if(ch===null || ch===undefined) return;
    node.appendChild(typeof ch==="string" ? document.createTextNode(ch) : ch);
  });
  return node;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }
function normalizeText(s){ if(s==null) return ""; return String(s).trim().replace(/\s+/g," ").replace(/[%%]/g,"%"); }
function parseNumberLoose(v){
  if(v==null) return NaN;
  const s = String(v).replace(/[??]/g,",").replace(/[%%]/g,"").trim();
  if(!s) return NaN;
  const n = Number(s);
  return Number.isFinite(n) ? n : NaN;
}
function nearlyEqual(a,b,eps=1e-2){
  if(a==null||b==null) return false;
  if(!Number.isFinite(a) || !Number.isFinite(b)) return false;
  return Math.abs(a-b) <= eps;
}
function roundTo(x, d=2){
  const n = Number(x);
  if(!Number.isFinite(n)) return String(x);
  const m = Math.pow(10,d);
  return (Math.round(n*m)/m).toFixed(d);
}
function formatNumber(x){
  const n = Number(x);
  if(!Number.isFinite(n)) return String(x);
  if(Math.abs(n - Math.round(n)) < 1e-9) return String(Math.round(n));
  return roundTo(n, 2);
}
function parseNumberList(s){
  if(s==null) return [];
  const raw = String(s).replace(/[?]/g, ",").trim();
  if(!raw) return [];
  return raw.split(",").map(x=>x.trim()).filter(Boolean).map(x=>Number(x)).filter(x=>Number.isFinite(x)).sort((a,b)=>a-b);
}
function sameNumberList(a,b){
  const A=parseNumberList(a), B=parseNumberList(b);
  if(A.length!==B.length) return false;
  for(let i=0;i<A.length;i++){
    if(Math.abs(A[i]-B[i])>1e-9) return false;
  }
  return true;
}

function latexFix(s){
  if(s==null) return "";
  // Reduce doubled backslashes produced by JS string escaping
  return String(s).replace(/\\\\/g, "\\");
}

function shuffleInPlace(arr, r){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(r()*(i+1));
    const tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
  return arr;
}

  });

function ensureAdaptiveState(){
  const ids = TEMPLATES.map(t=>t.id);
  const fallbackCore = ids.slice(0, Math.min(3, ids.length));
  const core = MASTERY_CORE.filter(id=>ids.includes(id));
  let active = normalizeAdaptiveOrder(state.activeOrder);
  if(state.masteryVersion !== MASTERY_VERSION || active.length===0){
    const r = seededRand("mastery-core|" + Date.now() + "|" + Math.random());
    active = shuffleInPlace([...(core.length ? core : fallbackCore)], r);
    state.masteryVersion = MASTERY_VERSION;
    state.activeOrder = active;
    state.order = active.slice();
    state.masterySupportCount = 0;
    state.masterySupportLog = [];
    state.masterySupportSources = {};
    saveState();
  }else if(active.length !== (state.activeOrder || []).length){
    state.activeOrder = active;
    state.order = active.slice();
    saveState();
  }
  if(state.currentIndex >= state.activeOrder.length){
    state.currentIndex = Math.max(0, state.activeOrder.length - 1);
    saveState();
  }
  return state.activeOrder;
}

function chooseSupportId(qid){
  const active = ensureAdaptiveState();
  const ids = TEMPLATES.map(t=>t.id);
  const pools = [];
  if(qid && MASTERY_PROFILES[qid]) pools.push(MASTERY_PROFILES[qid].supports || []);
  pools.push(MASTERY_CORE.filter(id=>id!==qid));
  pools.push(ids);
  for(const pool of pools){
    for(const id of pool){
      if(ids.includes(id) && !active.includes(id)) return id;
    }
  }
  return null;
}

function addAdaptiveSupportFor(qid, reason){
  const active = ensureAdaptiveState();
  const sourceKey = qid || "general";
  state.masterySupportSources = state.masterySupportSources || {};
  if((state.masterySupportSources[sourceKey] || 0) >= 1) return null;
  const nextId = chooseSupportId(qid);
  if(!nextId) return null;
  active.push(nextId);
  state.activeOrder = active;
  state.order = active.slice();
  state.masterySupportSources[sourceKey] = (state.masterySupportSources[sourceKey] || 0) + 1;
  state.masterySupportCount = (state.masterySupportCount || 0) + 1;
  state.masterySupportLog = state.masterySupportLog || [];
  state.masterySupportLog.push({from:qid || "general", added:nextId, reason:reason || "needs_support", at:Date.now()});
  saveState();
  return nextId;
}

function maybeQueueAdaptiveSupport(q){
  if(!q || adaptiveQuestionCorrect(q)) return null;
  return addAdaptiveSupportFor(q.id, "locked_wrong_attempt");
}

function ensureSupportForWeakQuestions(){
  const active = ensureAdaptiveState().slice();
  let added = false;
  for(const id of active){
    const q = buildQuestionById(id);
    if(!q) continue;
    if(adaptiveQuestionComplete(q) && !adaptiveQuestionCorrect(q)){
      if(addAdaptiveSupportFor(id, "results_gate")){
        added = true;
        break;
      }
    }
  }
  if(added) BANK = buildBank();
  return added;
}

function buildBank(){
  const order = ensureAdaptiveState();
  const bank = order.map(buildQuestionById).filter(Boolean);
  if(bank.length) return bank;
  state.activeOrder = TEMPLATES.slice(0, Math.min(3, TEMPLATES.length)).map(t=>t.id);
  state.order = state.activeOrder.slice();
  saveState();
  return state.activeOrder.map(buildQuestionById).filter(Boolean);
}

function gradeBranch(q, branch, bi, savedObj){
  const result = { okAll: true, byKey: {} };

  // parts
  (branch.parts||[]).forEach(p=>{
    const studentRaw = (savedObj && savedObj[p.key] != null) ? savedObj[p.key] : "";
    const correct = branch.answers[p.key];
    let ok=false;
    if(p.type==="mcq"){
      ok = normalizeText(studentRaw) === normalizeText(correct);
    }else if(p.type==="text"){
      if(p.orderInsensitive) ok = sameNumberList(studentRaw, correct);
      else ok = normalizeText(studentRaw) === normalizeText(correct);
    }else{
      ok = nearlyEqual(parseNumberLoose(studentRaw), Number(correct), 1e-2);
    }
    result.byKey[p.key]=ok;
    if(!ok) result.okAll=false;
  });

  // freq table
  if(branch.customUI==="freqTable" && branch.table && branch.table.rows){
    branch.table.rows.forEach(r=>{
      (r.inputs||[]).forEach(k=>{
        const studentRaw = (savedObj && savedObj[k] != null) ? savedObj[k] : "";
        const correct = branch.answers[k];
        const ok = nearlyEqual(parseNumberLoose(studentRaw), Number(correct), 1e-2);
        result.byKey[k]=ok;
        if(!ok) result.okAll=false;
      });
    });
  }

  return result;
}

function piePaths(counts, cx, cy, r){
  const total = counts.reduce((a,b)=>a+b,0);
  let a0 = -Math.PI/2;
  const paths = [];
  for(let i=0;i<counts.length;i++){
    const frac = counts[i]/total;
    const a1 = a0 + frac*2*Math.PI;
    const x0 = cx + r*Math.cos(a0), y0 = cy + r*Math.sin(a0);
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const large = (a1-a0) > Math.PI ? 1 : 0;
    const d = `M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} Z`;
    paths.push({d, frac, a0, a1});
    a0 = a1;
  }
  return paths;
}

function readBranchInputs(qid, bi, branch){

function applyFieldFeedback(qid, bi, grade){
  const container = document.querySelector(`[data-branch-container="${qid}::${bi}"]`);
  if(!container) return;

  const q = BANK.find(x=>x.id===qid);
  const branch = (q && q.branches) ? q.branches[bi] : null;
  const rec = ensureBranchRec(qid, bi);
  const saved = rec.saved || {};
  const status = rec.status;

  Object.entries(grade.byKey||{}).forEach(([k,ok])=>{
    const nodes = container.querySelectorAll(`[data-qid="${qid}"][data-bi="${bi}"][data-key="${k}"]`);
    nodes.forEach(n=>{
      if(n.type==="radio"){
        const wrap = n.closest(".choice");
        if(!wrap) return;

        // reset
        wrap.classList.remove("badField","goodField","revealCorrect");

        const sel = normalizeText(saved[k] != null ? saved[k] : "");
        const val = normalizeText(n.value != null ? n.value : "");
        const corr = (branch && branch.answers) ? normalizeText(branch.answers[k] != null ? branch.answers[k] : "") : "";

        // highlight only the selected option
        if(sel && val===sel){
          wrap.classList.add(ok ? "goodField" : "badField");
        }

        // on second wrong (locked): reveal the correct option only
        if(status==="locked" && corr && val===corr){
          wrap.classList.add("goodField","revealCorrect");
        }
      }else{
        const hasVal = (saved[k] != null && String(saved[k]).trim() !== "");
        n.classList.remove("badField","goodField");
        if(hasVal){
          n.classList.add(ok ? "goodField" : "badField");
        }
      }
    });
  });
}

      row.appendChild(label);

      el("button",{class:"btn small primary", "data-save-btn":`${q.id}::${bi}`, disabled: !window.__examRunning, onclick:()=>handleSaveBranch(q, branch, bi)},["??? ???????"]),

        el("span",{class:"ai-help-glyph","aria-hidden":"true"},["?"]),

    ]);
    if(rec.status==="correct" || rec.status==="locked" || !window.__examRunning){
      const sb = btns.querySelector(`[data-save-btn="${q.id}::${bi}"]`);
      if(sb) sb.disabled = true;
    }

    const container = el("div",{"data-branch-container":`${q.id}::${bi}`},[]);
    container.appendChild(head);
    container.appendChild(body);
    if((branch.parts||[]).length>0){ typesetMath(parts); container.appendChild(parts);}
    container.appendChild(btns);

    branchCard.appendChild(container);
    branches.appendChild(branchCard);

    // Apply feedback if already saved
    if(rec.saved && (rec.status==="wrong1")){
      const grade = gradeBranch(q, branch, bi, rec.saved);
    }
  });

  wrap.appendChild(titleRow);
  wrap.appendChild(branches);
  typesetMath(wrap);
}

function computeScore(){
  let total=0, correct=0;
  BANK.forEach(q=>{
    q.branches.forEach((branch,bi)=>{
      const rec = ensureBranchRec(q.id,bi);
      const keys = collectPartKeys(branch);
      const grade = gradeBranch(q, branch, bi, rec.saved||{});
      keys.forEach(k=>{
        total++;
        if(grade.byKey[k]) correct++;
      });
    });
  });
  const pct = total? (correct/total)*100 : 0;
  return {correct,total,pct:Math.round(pct*10)/10};
}

function buildAIWrongItemsForBranch(branch, grade, saved, revealCorrect){
  const items = [];
  try{
    (branch.parts || []).forEach(function(part){
      const ok = !!(grade && grade.byKey && grade.byKey[part.key]);
      if(ok) return;
      items.push({
        key: part.key,
        label: part.label || part.labelHtml || part.key || "",
        labelHtml: part.labelHtml || "",
        type: part.type || "",
        student: (saved && saved[part.key] != null) ? saved[part.key] : "",
        correct: revealCorrect && branch.answers ? branch.answers[part.key] : undefined
      });
    });
  }catch(_e){}
  return items;
}

function openSmartCoachForBranch(q, branch, bi, attempt, grade, saved, includeSolution){
  try{
    if(window.InternalAiTrainingAPI && typeof window.InternalAiTrainingAPI.handleWrongAnswer === "function"){
      return window.InternalAiTrainingAPI.handleWrongAnswer({
        lesson: (location.pathname.indexOf("1_2") >= 0 || document.title.indexOf("1.2") >= 0) ? "1.2" : "1.1",
        q: q,
        b: branch,
        branchIndex: bi,
        attempt: attempt,
        includeSolution: !!includeSolution,
        wrongItems: buildAIWrongItemsForBranch(branch, grade, saved, attempt >= 2 || !!includeSolution)
      }) === true;
    }
  }catch(_e){}
  return false;
}

function handleSaveBranch(q, branch, bi){
  const rec = ensureBranchRec(q.id, bi);
  if(rec.status==="correct" || rec.status==="locked" || !window.__examRunning) return;

  const {saved, okFilled} = readBranchInputs(q.id, bi, branch);
  if(!okFilled){
    openModal("تنبيه", `<div style="font-weight:900">أكمل جميع الحقول المطلوبة ثم احفظ الإجابة.</div>`);
    return;
  }

  rec.attempts = (rec.attempts || 0) + 1;
  rec.saved = saved;
  delete state.dirty[q.id];
  saveState();

  const grade = gradeBranch(q, branch, bi, rec.saved);
  if(grade.okAll){
    rec.status = "correct";
    saveState();
    applyFieldFeedback(q.id, bi, grade);
    disableBranchInputs(q.id, bi);
    setProgress();
    renderSidebar();
    return;
  }

  if(rec.attempts === 1){
    rec.status = "wrong1";
    saveState();
    applyFieldFeedback(q.id, bi, grade);
    setProgress();
    renderSidebar();
    const aiCoachOpened = openSmartCoachForBranch(q, branch, bi, 1, grade, rec.saved, false);
    if(!aiCoachOpened) openHelp(q, branch);
    return;
  }

  rec.status = "locked";
  saveState();
  applyFieldFeedback(q.id, bi, grade);
  disableBranchInputs(q.id, bi);
  setProgress();
  renderSidebar();
  const aiCoachOpened = openSmartCoachForBranch(q, branch, bi, 2, grade, rec.saved, true);
  if(!aiCoachOpened) promptOpenCorrectAnswer(q, branch, bi);
}

  ══════════════════════════════════════════════ */
  function irtProb(theta, b, a=1.0){
    /* P(correct) = 1 / (1 + e^(-a*(θ-b))) */
    return 1 / (1 + Math.exp(-a * (theta - b)));
  }
  function updateIRT(correct, model){
    /* تقدير θ بخوارزمية تدرج بسيطة (EAP-like online) */
    if(!aiModelsState.irtN) aiModelsState.irtN = 0;
    const theta = aiModelsState.irtTheta || 0;
    const b = model.irtB || 0;
    const p = irtProb(theta, b);
    const lr_rate = 0.65 / (1 + aiModelsState.irtN * 0.02);
    const delta = correct ? lr_rate * (1 - p) : -lr_rate * p;
    aiModelsState.irtTheta = clamp((theta + delta), -3, 3);
    /* تحديث صعوبة السؤال (item difficulty) */
    const itemLR = 0.25 / (1 + (model.attempts || 1) * 0.05);
    model.irtB = clamp(b + (correct ? -itemLR * (1-p) : itemLR * p), -3, 3);
    /* خطأ معياري — يقل مع زيادة المحاولات */
    aiModelsState.irtSE = clamp(1.0 / Math.sqrt(1 + aiModelsState.irtN * 0.5), 0.15, 1.0);
    aiModelsState.irtN += 1;
  }
  function irtThetaLabel(theta){
    var evts = aiModelsState.events || [];
    var att = evts.length;
    var ok = evts.filter(function(e){return e.correct}).length;
    var pct = att > 0 ? ok / att : 0;
    if(pct >= 0.85) return { text:"متقدم", color:"#059669" };
    if(pct >= 0.65) return { text:"جيد", color:"#0369a1" };
    if(pct >= 0.45) return { text:"متوسط", color:"#d97706" };
    if(pct >= 0.25) return { text:"دون المتوسط", color:"#dc2626" };
    if(att === 0) return { text:"لم يُقيّم بعد", color:"#94a3b8" };
    return { text:"يحتاج دعماً", color:"#dc2626" };
  }

  /* ══════════════════════════════════════════════
     النموذج ٣: محلل نمط الأخطاء
  ══════════════════════════════════════════════ */
  const ERROR_TYPES = {
    conceptual:    { label:"خطأ مفاهيمي",  badge:"conceptual",    advice:"راجع تعريف الارتباط والمفاهيم الأساسية" },
    computational: { label:"خطأ حسابي",    badge:"computational", advice:"تحقق من خطوات حساب ΣXY و Sxx" },
    application:   { label:"خطأ تطبيقي",   badge:"application",   advice:"راجع كيفية تطبيق الصيغة على البيانات" },
    none:          { label:"لا أخطاء",      badge:"none",          advice:"أداء ممتاز، استمر!" }
  };
  function classifyError(correct, attempts, mastery, branch){
    if(correct) return "none";
    var parts = (branch && Array.isArray(branch.parts)) ? branch.parts : [];
    var hasChoice = parts.some(function(p){ return p && (p.type === "mcq" || p.type === "text"); });
    var hasNumber = parts.some(function(p){ return p && p.type === "number"; });
    if(hasChoice && !hasNumber) return "conceptual";
    if(hasNumber && !hasChoice) return attempts > 1 ? "computational" : "application";
    if(mastery < 0.35) return "conceptual";
    if(attempts > 2)   return "computational";
    return "application";
  }
  function updateErrorPattern(correct, attempts, model, branch){
    const errType = classifyError(correct, attempts, model.mastery, branch);
    model.errorType = errType;
    if(!aiModelsState.errorCounts) aiModelsState.errorCounts = { conceptual:0, computational:0, application:0 };
    if(errType !== "none") aiModelsState.errorCounts[errType] = (aiModelsState.errorCounts[errType] || 0) + 1;
  }
  function dominantErrorType(){
    const ec = aiModelsState.errorCounts || {};
    const sorted = Object.entries(ec).sort((a,b) => b[1]-a[1]);
    if(!sorted.length || sorted[0][1] === 0) return "none";
    return sorted[0][0];
  }

  /* ══════════════════════════════════════════════
     النموذج ٤: معايرة الثقة (Brier Score)
     ملاحظة: نستخدم mastery كتقدير للثقة لأن
     الواجهة لا تطلب ثقة صريحة من المستخدم
  ══════════════════════════════════════════════ */
  function updateConfidenceCalib(correct, model){
    const evts = aiModelsState.events || []; const confidence = evts.length > 0 ? evts.filter(function(e){return e.correct}).length / evts.length : 0.5;
    if(!aiModelsState.confidenceEvents) aiModelsState.confidenceEvents = [];
    aiModelsState.confidenceEvents.push({ confidence, correct: correct ? 1 : 0 });
    if(aiModelsState.confidenceEvents.length > 60)
      aiModelsState.confidenceEvents = aiModelsState.confidenceEvents.slice(-60);
  }
  function brierScore(){
    const ev = aiModelsState.confidenceEvents || [];
    if(ev.length < 2) return null;
    const bs = ev.reduce((s,e) => s + Math.pow(e.confidence - e.correct, 2), 0) / ev.length;
    return bs;
  }
  function calibDiagnosis(){
    var evts = aiModelsState.events || [];
    var att = evts.length;
    var ok = evts.filter(function(e){return e.correct}).length;
    if(att === 0) return { text:"لا توجد بيانات كافية بعد.", cls:"" };
    var pct = ok / att;
    if(pct >= 0.85) return { text:"🎯 أداء ممتاز — استمر في هذا المستوى!", cls:"good" };
    if(pct >= 0.6) return { text:"✓ أداء جيد مع مجال للتحسين.", cls:"good" };
    if(pct >= 0.4) return { text:"⚠️ أداء متوسط — ركّز على المفاهيم التي أخطأت فيها.", cls:"warn" };
    return { text:"⚠️ أداء ضعيف — راجع المادة بتمعّن وأعد المحاولة.", cls:"bad" };
  }

  /* ══════════════════════════════════════════════
     النموذج ٥: توقع الدرجة
  ══════════════════════════════════════════════ */
  function predictGrade(ensemble, bkt, lr_val, completion){
    const trend = (aiModelsState.events || []).length >= 4
      ? (() => {
          const ev = (aiModelsState.events || []).slice(-6);
          const half1 = ev.slice(0, Math.floor(ev.length/2));
          const half2 = ev.slice(Math.floor(ev.length/2));
          const acc1 = half1.filter(e=>e.correct).length / (half1.length||1);
          const acc2 = half2.filter(e=>e.correct).length / (half2.length||1);
          return acc2 - acc1; /* موجب = يتحسن */
        })()
      : 0;
    const raw = clamp(
      bkt * 0.35 + ensemble * 0.30 + lr_val * 0.20 + clamp(completion, 0, 1) * 0.15 + trend * 0.1,
      0, 1
    );
    if(raw >= 0.88) return { grade:"ممتاز",        range:"90-100", color:"#059669", tip:"مستوى رائع، راجع بانتظام للحفاظ عليه." };
    if(raw >= 0.75) return { grade:"جيد جداً",     range:"75-89",  color:"#0369a1", tip:"قريب جداً من الامتياز، ركّز على المواضيع الأضعف." };
    if(raw >= 0.60) return { grade:"جيد",           range:"60-74",  color:"#d97706", tip:"مراجعة إضافية ستحسّن نتيجتك بشكل ملحوظ." };
    return             { grade:"يحتاج مراجعة",   range:"< 60",   color:"#dc2626", tip:"ابدأ المراجعة من المفاهيم الأساسية." };
  }

  function sanitizeAiKey(value){
    return String(value || "topic").toLowerCase().replace(/[^\p{L}\p{N}]+/gu, "_").replace(/^_+|_+$/g, "") || "topic";
  }

  function getTopicMeta(question, branch, branchIndex){
    const title = String((question && question.title) || (branch && (branch.level || branch.name)) || ("سؤال " + (branchIndex + 1 || 1))).trim();
    const keyBase = (question && question.id) ? question.id : title;
    return { key: sanitizeAiKey(keyBase), label: title };
  }

  function ensureTopicModel(meta){
    if(!aiModelsState.topics[meta.key]){
      aiModelsState.topics[meta.key] = {
        label: meta.label,
        attempts: 0,
        correct: 0,
        wrong: 0,
        mastery: 0.25,
        bkt: 0.25,
        nbWeak: 0.5,
        nbScore: 0.5,
        lr: 0.5,
        knn: 0.5,
        ensemble: 0.5,
        lastProb: 0.5,
        /* IRT per-topic */
        irtB: 0,        /* صعوبة السؤال */
        /* Forgetting */
        lastStudied: Date.now(),
        forgettingStab: 1.0,
        /* Error pattern (per topic) */
        errorType: "none"
      };
    }
    return aiModelsState.topics[meta.key];
  }

  function recordAiModelsAttempt(question, branch, branchIndex, correct, attempts){
    const meta = getTopicMeta(question, branch, branchIndex);
    const model = ensureTopicModel(meta);
    model.attempts += 1;
    if(correct) model.correct += 1;
    else model.wrong += 1;
    model.mastery = bktUpdate(model.mastery, correct);
    model.bkt = model.mastery;
    model.lr = computeLR(model.mastery);
    model.nbWeak = computeNB(model);
    model.nbScore = clamp(1 - model.nbWeak, 0.05, 0.98);
    model.knn = computeKNN(model.mastery);
    model.ensemble = clamp(0.20 * model.nbScore + 0.50 * model.lr + 0.30 * model.knn, 0.05, 0.98);
    model.lastProb = model.ensemble;
    aiModelsState.lastTopic = meta.label;
    /* ── النماذج الخمسة الجديدة ── */
    updateForgetting(model, correct);
    updateIRT(correct, model);
    updateErrorPattern(correct, attempts || 1, model, branch);
    updateConfidenceCalib(correct, model);
    /* ────────────────────────── */
    aiModelsState.events.push({
      topicKey: meta.key,
      topicLabel: meta.label,
      correct: !!correct,
      attempts: attempts || 1,
      time: Date.now()
    });
    if(aiModelsState.events.length > 120){
      aiModelsState.events = aiModelsState.events.slice(-120);
    }
    saveAiModelsState();
  }

  function averageMetric(selector, fallback){
    const models = Object.values(aiModelsState.topics || {});
    if(!models.length) return fallback;
    return models.reduce((sum, item) => sum + selector(item), 0) / models.length;
  }

  function weakestTopic(){
    const models = Object.values(aiModelsState.topics || {});
    if(!models.length) return null;
    return models.slice().sort((a, b) => (a.ensemble - b.ensemble) || (a.mastery - b.mastery))[0];
  }

  function strongestTopic(){
    const models = Object.values(aiModelsState.topics || {});
    if(!models.length) return null;
    return models.slice().sort((a, b) => (b.ensemble - a.ensemble) || (b.mastery - a.mastery))[0];
  }

  function aiInferenceText(){
    const weak = weakestTopic();
    const strong = strongestTopic();
    const ensemble = averageMetric((item) => item.ensemble, 0.5);
    if(!weak){
      return "تظهر هنا قراءة الأداء بعد بدء الإجابات المحفوظة.";
    }
    const statusText = ensemble < 0.45
      ? "هناك حاجة إلى دعم إضافي قبل السؤال التالي."
      : (ensemble < 0.7
        ? "الوضع متوسط ويحتاج إلى تثبيت أكثر."
        : "الأداء الحالي يوحي بجاهزية جيدة للسؤال التالي.");
    return `الموضوع الأقوى حاليًا: «${strong ? strong.label : "—"}»، والموضوع الذي يحتاج إلى مراجعة: «${weak.label}». ${statusText}`;
  }

.fab-root{

  cursor:pointer;
  display:grid;place-items:center;

@keyframes fabMainPulse{
  0%,100%{box-shadow:0 8px 28px rgba(3,105,161,.45),0 0 0 0 rgba(3,105,161,.3)}
  50%{box-shadow:0 8px 28px rgba(3,105,161,.45),0 0 0 12px rgba(3,105,161,0)}

<script>
/* ═══ منطق الزر العائم الدائري ═══ */
(function(){
  var fabOpen = false;

  window.toggleFabMenu = function(){
    fabOpen = !fabOpen;
    var root = document.getElementById("fabRoot");
    var overlay = document.getElementById("fabOverlay");
    if(fabOpen){
      root.classList.add("open");
      // لا نُظهر الـ overlay عند الأزرار الدائرية — فقط خلفية شفيفة جداً
      overlay.style.background = "rgba(15,23,42,.08)";
      overlay.classList.add("show");
    } else {
      root.classList.remove("open");
      overlay.style.background = "";
      overlay.classList.remove("show");
      document.body.style.overflow = "";
    }
  };

  window.closeFabSystem = function(){
    fabOpen = false;
    document.getElementById("fabRoot").classList.remove("open");
    document.getElementById("fabOverlay").classList.remove("show");
    document.body.style.overflow = "";
    // أغلق أي درج مفتوح
    document.querySelectorAll(".fab-drawer").forEach(function(d){ d.classList.remove("show"); });
  };

  window.handleFabAction = function(action){
    // أغلق القائمة أولاً
    document.getElementById("fabRoot").classList.remove("open");
    fabOpen = false;

    if(action === "questions"){
      syncQuestionsDrawer();
      openDrawer("drawerQuestions");
    } else if(action === "ai"){
      syncAIDrawer();
      openDrawer("drawerAI");
    } else if(action === "results"){
      closeFabSystem();
      if(typeof tryShowResults === "function") tryShowResults();
    } else if(action === "reset"){
      closeFabSystem();
      if(confirm("هل تريد إعادة تعيين التدريب؟ سيتم حذف جميع الإجابات.")) {
        if(typeof resetAll === "function") resetAll();
      }
    }
  };

  function openDrawer(id){
    var overlay = document.getElementById("fabOverlay");
    var drawer = document.getElementById(id);
    overlay.classList.add("show");
    drawer.classList.add("show");
    document.body.style.overflow = "hidden";
  }

  function syncQuestionsDrawer(){
    var inner = document.getElementById("drawerQuestionsInner");
    if(!inner) return;
    var progressText = document.getElementById("progressText");
    var progressBar = document.getElementById("progressBar");
    inner.innerHTML = "";
    if(progressText && progressBar){
      var prog = document.createElement("div");
      prog.style.cssText = "display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;";
      var ptClone = document.createElement("div");
      ptClone.style.cssText = "font-weight:900;color:#0f2a3b;font-size:15px";
      ptClone.textContent = progressText.textContent;
      var pbWrap = document.createElement("div");
      pbWrap.style.flex = "1";
      pbWrap.className = "progress";
      var pbFill = document.createElement("div");
      pbFill.style.width = progressBar.style.width || "0%";
      pbWrap.appendChild(pbFill);
      prog.appendChild(ptClone);
      prog.appendChild(pbWrap);
      inner.appendChild(prog);
    }
    var bank = (typeof BANK !== "undefined" && Array.isArray(BANK)) ? BANK : [];
    if(!bank.length) return;
    var list = document.createElement("div");
    list.style.cssText = "display:flex;flex-direction:column;gap:10px;margin-top:6px;";
    bank.forEach(function(q, idx){
      var done = false, correct = false;
      try{
        if(typeof isQuestionDone === "function") done = isQuestionDone(q);
        if(done && typeof isQuestionCorrect === "function") correct = isQuestionCorrect(q);
      }catch(e){}
      var isCurrent = (typeof state !== "undefined" && state.currentIndex === idx);
      var item = document.createElement("div");
      item.style.cssText = "display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;cursor:pointer;transition:all .2s;border:2px solid " + (isCurrent ? "#0369a1" : "#e2e8f0") + ";background:" + (isCurrent ? "#e0f2fe" : "#fff") + ";";
      item.onmouseenter = function(){ if(!isCurrent) this.style.borderColor="#0369a1"; this.style.transform="translateX(-2px)"; };
      item.onmouseleave = function(){ if(!isCurrent) this.style.borderColor="#e2e8f0"; this.style.transform="none"; };
      var dot = document.createElement("div");
      dot.style.cssText = "width:10px;height:10px;border-radius:50%;flex-shrink:0;background:" + (done ? (correct ? "#059669" : "#dc2626") : "#94a3b8") + ";";
      if(done) dot.style.boxShadow = "0 0 0 3px " + (correct ? "rgba(5,150,105,.2)" : "rgba(220,38,38,.15)");
      var title = document.createElement("div");
      title.style.cssText = "font-weight:800;font-size:13px;color:#0f172a;line-height:1.4;min-width:0;";
      title.textContent = q.title || "";
      item.appendChild(dot);
      item.appendChild(title);
      item.onclick = (function(i){
        return function(){
          if(typeof state !== "undefined"){ state.currentIndex = i; }
          try{ if(typeof saveState === "function") saveState(); }catch(e){}
          try{ if(typeof renderAll === "function") renderAll(); }catch(e){}
          closeFabSystem();
        };
      })(idx);
      list.appendChild(item);
    });
    inner.appendChild(list);
  }

  function syncAIDrawer(){
    var inner = document.getElementById("drawerAIInner");
    if(!inner) return;
    var rail = document.querySelector(".aiResultsRail");
    if(!rail) return;
    inner.innerHTML = rail.innerHTML;
  }

  /* أزرار الدرج السفلية */
  var nextDrawer = document.getElementById("nextBtnDrawer");
  var resultsDrawer = document.getElementById("showResultsBtnDrawer");
  if(nextDrawer) nextDrawer.onclick = function(){ closeFabSystem(); if(typeof next==="function") next(); };
  if(resultsDrawer) resultsDrawer.onclick = function(){ closeFabSystem(); if(typeof tryShowResults==="function") tryShowResults(); };

  /* مزامنة التقدم */
  function updateFabProgress(){
    var progressBar = document.getElementById("progressBar");
    var ring = document.getElementById("fabProgressRing");
    var ring2 = document.getElementById("fabProgressRing2");
    var badge = document.getElementById("fabQBadge");
    var pct = "0%";
    if(progressBar){ pct = progressBar.style.width || "0%"; }
    if(ring){ ring.style.background = "conic-gradient(rgba(255,255,255,.75) "+pct+", transparent 0%)"; }
    if(ring2){ ring2.style.background = "conic-gradient(rgba(255,255,255,.75) "+pct+", transparent 0%)"; ring2.style["-webkit-mask"] = "radial-gradient(circle at center, transparent 22px, black 23px)"; ring2.style.mask = "radial-gradient(circle at center, transparent 22px, black 23px)"; }
    if(badge){
      var allItems = document.querySelectorAll("#qList .qItem").length;
      var doneItems = document.querySelectorAll("#qList .qItem .dot.done, #qList .qItem .dot.bad").length;
      var remaining = allItems - doneItems;
      if(remaining > 0){ badge.textContent = remaining; badge.style.display = "grid"; }
      else { badge.style.display = "none"; }
    }
  }

  var origRenderAll = window.renderAll;
  if(typeof origRenderAll === "function"){
    window.renderAll = function(){
      var r = origRenderAll.apply(this, arguments);
      setTimeout(updateFabProgress, 100);
      return r;
    };
  }
  var sideEl = document.querySelector(".side");
  if(sideEl){ new MutationObserver(function(){ updateFabProgress(); }).observe(sideEl, {childList:true,subtree:true,attributes:true}); }

  setTimeout(updateFabProgress, 800);

  /* إغلاق بـ Escape */
  document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeFabSystem(); });

})();
</script>


<script>
(function(){
  if(!window.AdaptiveLearning){
    var candidates = ["assets/js/adaptive_learning.js","../assets/js/adaptive_learning.js","../../assets/js/adaptive_learning.js"];
    (function load(i){
      if(i>=candidates.length) return;
      var s=document.createElement("script");
      s.src=candidates[i];
      s.onload=function(){ bootstrap(); };
      s.onerror=function(){ load(i+1); };
      document.head.appendChild(s);
    })(0);
  }else{ bootstrap(); }

  function bootstrap(){
    if(!window.AdaptiveLearning) return;
    var aiState = { helpUsage:{}, startedAt:{} };
    function key(qid, bi){ return String(qid)+"::"+String(bi); }
    function touchStart(qid, bi){ var k=key(qid,bi); if(!aiState.startedAt[k]) aiState.startedAt[k]=Date.now(); }
    function spent(qid, bi){ var k=key(qid,bi); var st=aiState.startedAt[k]||Date.now(); var sec=Math.max(1, Math.round((Date.now()-st)/1000)); aiState.startedAt[k]=Date.now(); return sec; }
    function runInference(payload, branchCard){
      var bkt = window.AdaptiveLearning.updateBKT(payload.skill_id, payload.is_correct);
      var pred = window.AdaptiveLearning.predictMastery({
        difficulty: payload.difficulty,
        attempts_count: payload.attempts_count,
        used_help: payload.used_help,
        time_spent_sec: payload.time_spent_sec,
        showed_solution: payload.showed_solution,
        bkt_mastery: bkt.mastery
      });
      if(!branchCard) return;
      var panel = branchCard.querySelector(".aiInferencePanel");
      if(!panel){
        panel = document.createElement("div");
        panel.className = "aiInferencePanel";
        panel.style.cssText = "margin-top:10px;padding:10px 12px;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;color:#0f172a;font-weight:800";
        branchCard.appendChild(panel);
      }
      panel.innerHTML = "<div style='font-weight:900;margin-bottom:4px'>تحليل تعلم داخلي</div>" +
        "<div style='font-size:13px;color:#334155'>mastery probability: " + Math.round((pred.probability_mastered||0)*100) + "%</div>" +
        "<div style='font-size:13px;color:#334155'>current skill mastery: " + Math.round((bkt.mastery||0)*100) + "%</div>" +
        "<div style='font-size:13px;color:#334155'>recommended support: " + pred.recommended_support + "</div>";
    }

    var origRenderMain = window.renderMain;
    if(typeof origRenderMain === "function"){
      window.renderMain = function(){
        var out = origRenderMain.apply(this, arguments);
        try{
          if(Array.isArray(window.BANK)){
            window.BANK.forEach(function(q){ (q.branches||[]).forEach(function(_b,bi){ touchStart(q.id, bi); }); });
          }
        }catch(_e){}
        return out;
      };
    }

    var origShowHelp = window.showHelp;
    if(typeof origShowHelp === "function"){
      window.showHelp = function(q, b){
        try{ var bi=(q&&q.branches)?q.branches.indexOf(b):-1; if(q&&bi>=0) aiState.helpUsage[key(q.id,bi)] = true; }catch(_e){}
        return origShowHelp.apply(this, arguments);
      };
    }

    var origSaveBranchAnswer = window.saveBranchAnswer;
    if(typeof origSaveBranchAnswer === "function"){
      window.saveBranchAnswer = function(q, b, bi, branchCard, saveBtn){
        var qid = q && q.id ? q.id : "unknown_question";
        var attemptBefore = 0;
        var wasLocked = false;
        try{
          wasLocked = (typeof window._isBranchLocked === "function") ? !!window._isBranchLocked(qid, bi) : false;
          attemptBefore = (typeof window._getSaveAttempt === "function") ? Number(window._getSaveAttempt(qid, bi) || 0) : 0;
        }catch(_e){}

        var out = origSaveBranchAnswer.apply(this, arguments);

        try{
          if(wasLocked) return out;
          var outcome = (typeof window._getOutcome === "function") ? window._getOutcome(qid, bi) : null;
          var attemptsNow = (typeof window._getSaveAttempt === "function") ? Number(window._getSaveAttempt(qid, bi) || 0) : attemptBefore;
          var attemptsCount = Math.max(1, attemptsNow || (attemptBefore + 1));
          var usedHelp = !!aiState.helpUsage[key(qid, bi)];
          var showedSolution = outcome === "wrong";
          var isCorrect = outcome === "correct";
          if(!isCorrect && !showedSolution && attemptsNow === attemptBefore) return out;

          var payload = {
            question_id: qid,
            skill_id: qid,
            topic_id: qid,
            difficulty: (b && (b.difficulty || b.level || b.name)) || "medium",
            is_correct: isCorrect,
            attempts_count: attemptsCount,
            used_help: usedHelp,
            time_spent_sec: spent(qid, bi),
            showed_solution: showedSolution,
            timestamp: new Date().toISOString()
          };
          window.AdaptiveLearning.collectStudentEvent(payload);
          runInference(payload, branchCard);
        }catch(_e){}
        return out;
      };
    }

    window.exportTrainingData = function(){ return window.AdaptiveLearning.exportTrainingData(); };

    if(!window.__autoExportHooked){
      window.__autoExportHooked = true;
      var _tr = window.tryShowResults;
      if(typeof _tr === "function"){
        window.tryShowResults = function(){
          var r = _tr.apply(this, arguments);
          try{ setTimeout(function(){ window.AdaptiveLearning.exportTrainingData(); }, 800); }catch(_e){}
          return r;
        };
      }
    }

    var modelCandidates = [
      {bktPath:"models/bkt_model.json", lrPath:"models/lr_model.json"},
      {bktPath:"../models/bkt_model.json", lrPath:"../models/lr_model.json"},
      {bktPath:"../../models/bkt_model.json", lrPath:"../../models/lr_model.json"}
    ];
    (function tryModels(i){
      if(i>=modelCandidates.length) return;
      window.AdaptiveLearning.loadModelWeights(modelCandidates[i]).then(function(){}, function(){ tryModels(i+1); });
    })(0);
  }
})();
</script>

  function cleanVisibleMathText(value){
    var s = value == null ? '' : String(value);
    var old;
    for(var pass=0; pass<4; pass++){
      old = s;
      s = s.replace(/\\\\/g,'\\');
      s = s.replace(/\\\[|\\\]|\\\(|\\\)/g,'');
      s = s.replace(/\\text\{([^{}]*)\}/g,'$1');
      s = s.replace(/\\mathrm\{([^{}]*)\}/g,'$1');
      s = s.replace(/\\operatorname\{([^{}]*)\}/g,'$1');
      s = s.replace(/\\Rightarrow/g,'⇒');
      s = s.replace(/\\rightarrow/g,'→');
      s = s.replace(/\\leftarrow/g,'←');
      s = s.replace(/\\subset/g,'⊂');
      s = s.replace(/\\neq|\\ne/g,'≠');
      s = s.replace(/\\times/g,'×');
      s = s.replace(/\\cdots|\\ldots/g,'…');
      s = s.replace(/\\leq/g,'≤');
      s = s.replace(/\\geq/g,'≥');
      s = s.replace(/\\approx/g,'≈');
      s = s.replace(/\\circ/g,'°');
      s = s.replace(/\\%/g,'%');
      // Very small fallback for simple fractions if a raw fraction leaks to the visible text.
      s = s.replace(/\\(?:d?frac)\{([^{}]*)\}\{([^{}]*)\}/g,'$1 / $2');
      if(s === old) break;
    }
    // Remove leftover slashes before common symbolic words only; do not touch Arabic punctuation.
    s = s.replace(/\\(Population|Sample|Parameter|Statistic|N|n|x|P|A|B|AB|O)\b/g,'$1');
    return s;
  }

  function repairTextNodes(root){
    root = root || document.body;
    if(!root) return;
    var skip = /^(SCRIPT|STYLE|TEXTAREA|INPUT|SELECT|OPTION|CODE|PRE)$/;
    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode:function(node){
        var p = node.parentNode;
        if(!p || skip.test(p.nodeName)) return NodeFilter.FILTER_REJECT;
        var t = node.nodeValue || '';
        if(/\\\(|\\\)|\\\[|\\\]|\\text|\\mathrm|\\operatorname|\\Rightarrow|\\rightarrow|\\subset|\\neq|\\ne|\\times|\\circ|\\frac|\\dfrac/.test(t)) return NodeFilter.FILTER_ACCEPT;
        return NodeFilter.FILTER_REJECT;
      }
    });
    var nodes = [], n;
    while((n = walker.nextNode())) nodes.push(n);
    nodes.forEach(function(node){
      var fixed = cleanVisibleMathText(node.nodeValue);
      if(fixed !== node.nodeValue) node.nodeValue = fixed;
    });
  }

  function repairAssistantTitles(root){
    (root || document).querySelectorAll('.cu46-card-title').forEach(function(el){
      var t = cleanVisibleMathText(el.textContent || '');
      // لا نعرض عنوان الفرع داخل بطاقة المساعد؛ البطاقة تعرض فقط نوع الطلب كما اتفقنا.
      t = t.replace(/\s*[—-]\s*.+$/,'').trim();
      if(t && el.textContent !== t) el.textContent = t;
    });
  }

  function setImageWithFallback(img, list){
    if(!img || !list || !list.length) return;
    var i = 0;
    img.onerror = function(){
      i += 1;
      if(i < list.length) img.src = list[i];
    };
    if((img.getAttribute('src') || '') !== list[0]) img.src = list[0];
    img.style.display = 'block';
    img.style.visibility = 'visible';
    img.style.opacity = '1';
  }

      if(!core.parentNode) coreWrap.appendChild(core);

      setImageWithFallback(core, CORE_FALLBACKS);
    }
  }

  function buildAIDrawerContent(){
    var bank = (typeof BANK !== 'undefined' && Array.isArray(BANK)) ? BANK : [];
    var done = 0, total = 0, correct = 0, wrong = 0;
    try{
      bank.forEach(function(q){
        (q.branches || []).forEach(function(_b, bi){
          total++;
          var rec = (typeof ensureBranchRec === 'function') ? ensureBranchRec(q.id, bi) : null;
          if(rec && (rec.status === 'correct' || rec.status === 'locked' || rec.status === 'wrong1')){
            done++;
            if(rec.status === 'correct') correct++; else wrong++;
          }
        });
      });
    }catch(e){}
    var pct = total ? Math.round(done / total * 100) : 0;
    var currentTitle = '';
    try{ currentTitle = bank[state.currentIndex] ? bank[state.currentIndex].title : ''; }catch(e){}
    return ''+
      '<div style="display:grid;gap:12px">'+
        '<div style="padding:14px;border:1px solid #e0e7ff;border-radius:16px;background:#f8fafc">'+
          '<div style="font-weight:1000;color:#0f172a;margin-bottom:6px">تحليل الأداء الحالي</div>'+
          '<div style="font-weight:800;color:#334155;line-height:1.9">'+
            'السؤال الحالي: '+(currentTitle || 'لم يبدأ بعد')+'<br>'+ 
            'نسبة الإنجاز: '+pct+'%<br>'+ 
            'الصحيح: '+correct+' | يحتاج مراجعة: '+wrong+
          '</div>'+ 
        '</div>'+ 
        '<div style="padding:14px;border:1px solid #bae6fd;border-radius:16px;background:#f0f9ff;font-weight:850;color:#075985;line-height:1.9">'+
          'هذا التحليل لا يعرض الحلول. استخدم المساعد الذكي داخل السؤال للتوجيه، ويظهر الحل الكامل فقط بعد المحاولة الثانية.'+
        '</div>'+ 
      '</div>';
  }

  function setLogo(img, src, alt){
    if(!img) return;
    img.onerror = null;
    img.removeAttribute('srcset'); img.removeAttribute('data-src'); img.removeAttribute('data-original');
    img.alt = alt || '';
    img.loading = 'eager'; img.decoding = 'async';
    img.style.display='block'; img.style.visibility='visible'; img.style.opacity='1'; img.style.objectFit='contain';
    if(img.getAttribute('src') !== src) img.setAttribute('src', src);
  }
